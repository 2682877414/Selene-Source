name: 梦瑶影视 2.0全平台（对齐官方6包输出）

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          $line = Get-Content pubspec.yaml | Select-String '^version:'
          if ($line) {
            $version = $line.Line -replace 'version: ', ''
            $version = $version.Trim()
          } else {
            $version = "1.0.0"
          }
          $version = $version -split '\+' | Select-Object -First 1
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Build Windows
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          flutter pub get
          mkdir dist -Force
          flutter build windows --release
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "dist/selene-$version-windows-x64-portable.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*

  build-android:
    runs-on: ubuntu-latest
    name: Build Android
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          [ -z "$VERSION" ] && VERSION="1.0.0"
          VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Build Android 分架构APK
        run: |
          flutter pub get
          # 关键：--split-per-abi 分出 armv7a / armv8
          flutter build apk --release --split-per-abi
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/selene-${{ steps.get_version.outputs.version }}-armv7a.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/selene-${{ steps.get_version.outputs.version }}-armv8.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/*.apk

  build-macos:
    runs-on: macos-latest
    name: Build macOS
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          [ -z "$VERSION" ] && VERSION="1.0.0"
          VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Build macOS
        run: |
          flutter pub get
          mkdir -p dist
          flutter build macos --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: macos-release
          path: build/macos/Build/Products/Release/

  build-ios:
    runs-on: macos-latest
    name: Build iOS
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Build iOS
        continue-on-error: true
        run: |
          flutter pub get
          flutter build ios --release --no-codesign

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: ios-release
          path: build/ios/ipa/
