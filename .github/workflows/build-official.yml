name: 梦瑶影视 2.0全平台（官方同款分文件）

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          $line = Get-Content pubspec.yaml | Select-String '^version:'
          if ($line) {
            $version = $line.Line -replace 'version: ', ''
            $version = $version.Trim()
          } else {
            $version = "1.0.0"
          }
          $version = $version -split '\+' | Select-Object -First 1
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Build Windows
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          flutter pub get
          flutter build windows --release
          mkdir dist
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "dist/selene-$version-windows-x64-portable.zip" -Force

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: selene-${{ steps.get_version.outputs.version }}-windows-x64-portable.zip
          path: dist/*.zip

  build-android:
    runs-on: ubuntu-latest
    name: Build Android
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          [ -z "$VERSION" ] && VERSION="1.0.0"
          VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Build Android APKs
        run: |
          flutter pub get
          # 构建多架构 APK，和官方一样分 armv7a/armv8
          flutter build apk --release --split-per-abi
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/selene-${{ steps.get_version.outputs.version }}-armv8.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/selene-${{ steps.get_version.outputs.version }}-armv7a.apk

      - name: Upload Android
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: dist/*.apk

  build-macos-ios:
    runs-on: macos-latest
    name: Build macOS & iOS
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          [ -z "$VERSION" ] && VERSION="1.0.0"
          VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: Build macOS & iOS
        continue-on-error: true
        run: |
          flutter pub get
          # 构建 macOS dmg（分架构）
          flutter build macos --release
          # 构建 iOS ipa（不签名）
          flutter build ios --release --no-codesign
          mkdir -p dist
          # 把生成的文件复制到 dist，方便上传
          cp build/macos/Build/Products/Release/*.dmg dist/ 2>/dev/null || true
          cp build/ios/ipa/*.ipa dist/ 2>/dev/null || true

      - name: Upload macOS & iOS
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: macos-ios-files
          path: dist/*
