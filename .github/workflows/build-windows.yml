name: Windows x64 单独构建

on:
  workflow_dispatch:
  
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: ver
        run: $v=(cat pubspec.yaml|sls '^version:');$v=$v.ToString().Split()[1].Split('+')[0];echo "version=$v" | Out-File -Append $env:GITHUB_OUTPUT
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: flutter build windows --release
      - run: New-Item -ItemType Directory -Path dist -Force | Out-Null
      - run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath dist/selene-${{steps.ver.outputs.version}}-windows-x64-portable.zip -Force
      - uses: actions/upload-artifact@v4
        with: {name: windows-x64, path: dist/}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: windows-x64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
