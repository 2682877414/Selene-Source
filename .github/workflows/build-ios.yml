# ==========================================================
# 工作流名称：梦瑶影视 iOS 自动构建（未签名包）
# 功能：自动编译出 iOS 未签名 .ipa 安装包
# 说明：打出的包需要自己签名后安装，不需要苹果证书
# ==========================================================
name: 梦瑶影视2.0 (iOS自动构建)

# ==========================================================
# 触发方式：
# 1. 打 v 开头标签自动构建（如 v2.0.0）
# 2. 支持手动点击 Run Workflow
# ==========================================================
on: 
  push:
    tags:
      - 'v*'
  workflow_dispatch

jobs:
  build-ios:
    # iOS 必须用 macOS 环境
    runs-on: macos-latest
    steps:
      # 1. 拉取代码
      - uses: actions/checkout@v4

      # 2. 安装 Flutter
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7

      # ==========================================================
      # 3. 【已修复】自动读取版本号
      # 从 pubspec.yaml 提取版本号 2.0.0
      # ==========================================================
      - name: 获取版本号
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 4. 安装依赖
      - run: flutter pub get

      # ==========================================================
      # 5. 构建 iOS 未签名包（核心命令）
      # --no-codesign 代表不使用苹果证书签名
      # ==========================================================
      - run: flutter build ios --release --no-codesign

      # 6. 查看编译后架构（检查是否正常）
      - name: 查看架构
        run: lipo -info build/ios/iphoneos/Runner.app/Runner

      # ==========================================================
      # 7. 打包成 IPA 文件（iOS 安装包格式）
      # 必须放到 Payload 文件夹再压缩
      # ==========================================================
      - name: 打包成 IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "梦瑶影视${{ env.VERSION }}-iOS-未签名.ipa" Payload/

      # ==========================================================
      # 8. 上传安装包，构建完成可直接下载
      # ==========================================================
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: 梦瑶影视${{ env.VERSION }}-iOS-未签名
          path: "梦瑶影视${{ env.VERSION }}-iOS-未签名.ipa"
