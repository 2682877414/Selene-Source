# ==========================================================
# 梦瑶影视 iOS 自动构建（未签名包）
# 功能：自动编译未签名 iOS 安装包，无需证书
# ==========================================================
name: 梦瑶影视2.0 (iOS自动构建)

on: 
  push:
    tags:
      - 'v*'
  workflow_dispatch

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7

      # ==============================================
      # ✅ 【绝对不会出错】版本号读取
      # ==============================================
      - name: 获取版本号
        run: |
          VERSION=`cat pubspec.yaml | grep -E '^version:' | sed 's/version: //g' | cut -d'+' -f1`
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "读取到版本号：$VERSION"

      - run: flutter pub get

      # ==============================================
      # ✅ 构建未签名 iOS 包
      # ==============================================
      - run: flutter build ios --release --no-codesign

      - name: 查看架构
        run: lipo -info build/ios/iphoneos/Runner.app/Runner

      # ==============================================
      # ✅ 打包 IPA
      # ==============================================
      - name: 打包成 IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "梦瑶影视-${{ env.VERSION }}-iOS-未签名.ipa" Payload/

      # ==============================================
      # ✅ 上传产物
      # ==============================================
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: 梦瑶影视-${{ env.VERSION }}-iOS-未签名
          path: "梦瑶影视-${{ env.VERSION }}-iOS-未签名.ipa"
