name: Android armv8 单独构建
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: ver
        run: echo "version=$(grep version: pubspec.yaml | awk '{print $2}' | cut -d+ -f1)" >> $GITHUB_OUTPUT
      - uses: subosito/flutter-action@v2
      - uses: actions/setup-java@v5
        with: {distribution: zulu, java-version: 21}
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - run: mkdir dist && cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/selene-${{steps.ver.outputs.version}}-armv8.apk
      - uses: actions/upload-artifact@v4
        with: {name: android-armv8, path: dist/}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: android-armv8/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
