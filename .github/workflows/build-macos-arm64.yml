name: macOS arm64 单独构建

on:
  workflow_dispatch:
  
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: ver
        run: echo "version=$(grep version: pubspec.yaml | awk '{print $2}' | cut -d+ -f1)" >> $GITHUB_OUTPUT
      - uses: subosito/flutter-action@v2
      - run: flutter pub get
      - run: flutter build macos --release --target-platform macos-arm64
      - uses: actions/upload-artifact@v4
        with: {name: macos-arm64, path: build/macos/Build/Products/Release/}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: macos-arm64/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
