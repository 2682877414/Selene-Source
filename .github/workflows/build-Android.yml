# ==========================================================
# 【梦瑶影视2.0 · 安卓自动构建】
# 签名方式：GitHub 5个加密变量 → 安全不泄露
# 触发：打 v* 标签自动构建 / 手动触发
# ==========================================================
name: 梦瑶影视2.0 (安卓自动构建)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: 构建安卓

    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 读取版本号
      - name: 读取版本号
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 3. 配置 Flutter
      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      # 4. 安装 Java 21
      - name: 安装 Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      # ==============================================
      # 5. 从 Base64 恢复签名文件（使用你的5个变量）
      # ==============================================
      - name: 恢复签名文件
        run: |
          echo "${{ secrets.ENCODED_KEYSTORE }}" | base64 -d > ${{ secrets.KEY_PATH }}

      # ==============================================
      # 6. 生成 key.properties 配置
      # ==============================================
      - name: 生成签名配置
        run: |
          cat > android/key.properties << EOF
          storeFile=${{ secrets.KEY_PATH }}
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      # 7. 安装依赖
      - name: 安装依赖
        run: flutter pub get

      # 8. 同意 SDK 许可
      - name: 同意许可
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      # 9. 构建 APK
      - name: 构建通用APK
        run: flutter build apk --release

      # 10. 构建架构分包
      - name: 构建架构APK
        run: flutter build apk --release --split-per-abi

      # 11. 重命名APK
      - name: 重命名APK
        run: |
          VERSION=${{ github.ref_name }}
          DIR=build/app/outputs/flutter-apk
          mv $DIR/app-release.apk                  "梦瑶影视2.0-Android-$VERSION.apk"
          mv $DIR/app-arm64-v8a-release.apk         "梦瑶影视2.0-Android-arm64-v8a-$VERSION.apk"
          mv $DIR/app-armeabi-v7a-release.apk       "梦瑶影视2.0-Android-armeabi-v7a-$VERSION.apk"
          mv $DIR/app-x86_64-release.apk            "梦瑶影视2.0-Android-x86_64-$VERSION.apk"

      # 12. 上传产物
      - name: 上传到Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            梦瑶影视2.0-Android-${{ github.ref_name }}.apk
            梦瑶影视2.0-Android-arm64-v8a-${{ github.ref_name }}.apk
            梦瑶影视2.0-Android-armeabi-v7a-${{ github.ref_name }}.apk
            梦瑶影视2.0-Android-x86_64-${{ github.ref_name }}.apk
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
