name: Android 单独构建（正确签名·不闪退）
on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: 构建安卓（已正确签名）
    steps:
      - name: 拉取代码仓库
        uses: actions/checkout@v4

      - name: 读取版本号
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 配置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: 安装 Java 环境
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      # ↓↓↓↓↓ 修复路径 → GitHub 100% 识别 ↓↓↓↓↓
      - name: 生成签名文件
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/my_key.jks

      - name: 创建签名配置
        run: |
          cat > android/key.properties << EOF
storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
storeFile=app/my_key.jks
EOF

      - name: 构建安卓安装包
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi
          flutter build apk --release
          
          mkdir -p dist
          VERSION=${{ steps.get_version.outputs.version }}
          
          cp build/app/outputs/flutter-apk/app-release.apk                  dist/沐瑶影视-$VERSION-全架构.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk       dist/沐瑶影视-$VERSION-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk     dist/沐瑶影视-$VERSION-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk          dist/沐瑶影视-$VERSION-x86_64.apk

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 沐瑶影视-${{ steps.get_version.outputs.version }}-安卓完整包
          path: dist/*.apk
