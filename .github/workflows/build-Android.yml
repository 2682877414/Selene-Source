# ==========================================================
# 梦瑶影视2.0 (安卓自动构建)
# 功能：打标签自动构建带签名APK，自动上传Release
# ==========================================================
name: 梦瑶影视2.0 (安卓自动构建)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: 构建安卓

    steps:
      - name: 拉取代码仓库
        uses: actions/checkout@v4

      - name: 读取版本号
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 配置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: 安装 Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 安装 NDK 29.0.14033849
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;29.0.14033849"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14033849" >> $GITHUB_ENV

      - name: 恢复签名文件
        run: |
          echo "${{ secrets.ENCODED_KEYSTORE }}" | base64 -d > ${{ secrets.KEY_PATH }}

      - name: 配置签名信息
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=${{ secrets.KEY_PATH }}
          EOF

      - name: 清理并安装依赖
        run: |
          flutter clean
          flutter pub get

      - name: 同意 Android SDK 许可证
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: 构建通用APK
        run: flutter build apk --release

      - name: 构建架构分包APK
        run: flutter build apk --release --split-per-abi

      - name: 重命名APK文件
        run: |
          VERSION=${{ github.ref_name }}
          DIR=build/app/outputs/flutter-apk
          mv $DIR/app-release.apk                  "梦瑶影视2.0-Android-$VERSION.apk"
          mv $DIR/app-arm64-v8a-release.apk         "梦瑶影视2.0-Android-arm64-v8a-$VERSION.apk"
          mv $DIR/app-armeabi-v7a-release.apk       "梦瑶影视2.0-Android-armeabi-v7a-$VERSION.apk"
          mv $DIR/app-x86_64-release.apk            "梦瑶影视2.0-Android-x86_64-$VERSION.apk"

      - name: 上传产物到Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            梦瑶影视2.0-Android-${{ github.ref_name }}.apk
            梦瑶影视2.0-Android-arm64-v8a-${{ github.ref_name }}.apk
            梦瑶影视2.0-Android-armeabi-v7a-${{ github.ref_name }}.apk
            梦瑶影视2.0-Android-x86_64-${{ github.ref_name }}.apk
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
