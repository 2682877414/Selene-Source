name: Android 单独构建（终极安全签名 · 零泄露）
on: workflow_dispatch

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: 构建安卓（已签名）
    steps:
      - name: 拉取代码仓库
        uses: actions/checkout@v4

      - name: 读取版本号
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          VERSION=$(echo "$VERSION" | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 配置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: 安装 Java 环境
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      # 把签名文件直接还原到 android/ 目录，路径完全匹配
      - name: 还原签名文件
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/my_key.jks

      - name: 配置签名信息
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=my_key.jks" >> android/key.properties

      - name: 构建安卓安装包
        run: |
          flutter pub get
          flutter build apk --release --split-per-abi
          flutter build apk --release
          
          mkdir -p dist
          VERSION=${{ steps.get_version.outputs.version }}
          
          cp build/app/outputs/flutter-apk/app-release.apk                  dist/沐瑶影视-$VERSION-全架构.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk       dist/沐瑶影视-$VERSION-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk     dist/沐瑶影视-$VERSION-armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk          dist/沐瑶影视-$VERSION-x86_64.apk

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 沐瑶影视-${{ steps.get_version.outputs.version }}-安卓全签名包
          path: dist/*.apk
