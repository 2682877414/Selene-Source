# ==========================================================
# 【安卓永久版 · 完整全注释】
# 功能：打标签自动构建安卓4个安装包，自动上传到GitHub Release
# 输出文件命名：MengYaoTV-Android-xxx-版本号.apk
# ==========================================================
name: 梦瑶影视 2.0 ( Android 自动构建)

# 触发条件：打 v 开头标签时自动运行，支持手动触发
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_android:
    # 安卓构建必须使用 Ubuntu 环境
    runs-on: ubuntu-latest

    steps:
      # ==============================================
      # 步骤1：拉取 GitHub 上的最新项目代码
      # ==============================================
      - name: 拉取项目代码
        uses: actions/checkout@v4

      # ==============================================
      # 步骤2：安装 Flutter 环境
      # ==============================================
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      # ==============================================
      # 步骤3：【修复】同意 Android SDK 所有协议
      # ==============================================
      - name: 同意Android SDK协议
        run: |
          yes | sdkmanager --licenses
          yes | sdkmanager --install "ndk;26.1.10909125"

      # ==============================================
      # 步骤4：安装项目依赖
      # ==============================================
      - name: 安装依赖
        run: flutter pub get

      # ==============================================
      # 步骤5：构建安卓通用APK
      # ==============================================
      - name: 构建通用APK
        run: flutter build apk --release

      # ==============================================
      # 步骤6：构建架构分包APK
      # ==============================================
      - name: 构建架构分包APK
        run: flutter build apk --release --split-per-abi

      # ==============================================
      # 步骤7：重命名APK文件
      # ==============================================
      - name: 重命名APK文件
        run: |
          VERSION=${{ github.ref_name }}
          DIR=build/app/outputs/flutter-apk

          mv $DIR/app-release.apk                  MengYaoTV-Android-$VERSION.apk
          mv $DIR/app-arm64-v8a-release.apk         MengYaoTV-Android-arm64-v8a-$VERSION.apk
          mv $DIR/app-armeabi-v7a-release.apk       MengYaoTV-Android-armeabi-v7a-$VERSION.apk
          mv $DIR/app-x86_64-release.apk            MengYaoTV-Android-x86_64-$VERSION.apk

      # ==============================================
      # 步骤8：上传全部APK到Release
      # ==============================================
      - name: 上传APK到发布页
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MengYaoTV-Android-${{ github.ref_name }}.apk
            MengYaoTV-Android-arm64-v8a-${{ github.ref_name }}.apk
            MengYaoTV-Android-armeabi-v7a-${{ github.ref_name }}.apk
            MengYaoTV-Android-x86_64-${{ github.ref_name }}.apk
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
