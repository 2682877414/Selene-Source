name: 梦瑶影视 2.0 (Windows)

on:
  push:
    tags:
      - 'v*'  # 触发条件：当推送的标签以 'v' 开头时
      
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Windows 正式版
        run: flutter build windows --release

      # 把构建结果打包成一个 zip 文件
      - name: 打包 Windows 安装包
        run: |
          cd build/windows/x64/runner/Release
          tar -a -c -f ../../../../MengYaoTV2.0-Windows.zip *

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: MengYaoTV2.0-Windows.zip  # 只传这个压缩包
          name: MengYaoTV2.0 ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
