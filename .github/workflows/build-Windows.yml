# ==========================================================
# 【永久版 · 全注释 · 绝对出包】梦瑶影视 Windows 构建脚本
# 解决：打包失败、无ZIP、Release空
# ==========================================================
name: 梦瑶影视 2.0 (Windows 自动构建)

# 触发：打 v 开头标签自动运行
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ==============================================
      # 步骤1：拉取项目代码
      # ==============================================
      - name: 拉取代码
        uses: actions/checkout@v4

      # ==============================================
      # 步骤2：安装 Flutter 环境
      # ==============================================
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      # ==============================================
      # 步骤3：安装项目依赖
      # ==============================================
      - name: 安装依赖
        run: flutter pub get

      # ==============================================
      # 步骤4：编译 Windows 正式版
      # ==============================================
      - name: 编译 Windows
        run: flutter build windows --release

      # ==============================================
      # 步骤5：【关键】打包成 ZIP（100%执行）
      # ==============================================
      - name: 打包 ZIP
        run: 7z a MengYaoTV-${{ github.ref_name }}.zip ./build/windows/x64/runner/Release/*

      # ==============================================
      # 步骤6：查看是否生成 ZIP
      # ==============================================
      - name: 查看文件
        run: dir

      # ==============================================
      # 步骤7：上传到 Release
      # ==============================================
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: MengYaoTV-${{ github.ref_name }}.zip
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
