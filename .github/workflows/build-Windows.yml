# ==============================
# 脚本名称：Windows 自动构建打包
# 功能：打 tag → 自动编译 → 自动 ZIP 压缩 → 自动上传到对应版本 Release
# ==============================
name: Build Windows Release

# ==============================
# 触发条件：
# 只有 手动触发 或 打 v 开头的标签（如 v2.0.1）时才运行
# ==============================
on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0 v2.0.1 v3.0.0 等标签
  workflow_dispatch:  # 允许手动点击运行

# ==============================
# 构建任务
# ==============================
jobs:
  build:
    # 运行环境：Windows 最新系统
    runs-on: windows-latest

    steps:
      # 1. 拉取你的代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 安装 Flutter 环境
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      # 3. 安装项目依赖（必须执行）
      - name: 安装依赖
        run: flutter pub get

      # 4. 编译 Windows 正式版（生成可执行文件）
      - name: 编译 Windows 正式版
        run: flutter build windows --release

      # 5. 进入编译输出目录 → 打包成 ZIP
      - name: 打包成 ZIP 压缩包
        run: |
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath ../../../../MengYaoTV-${{ github.ref_name }}.zip

      # 6. 上传 ZIP 到 GitHub Release
      # 重点：自动上传到你当前打的 tag 版本里，不会串版本
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: MengYaoTV-${{ github.ref_name }}.zip  # 要上传的文件
          tag_name: ${{ github.ref_name }}            # 上传到对应 tag（关键！）
          name: "MengYaoTV ${{ github.ref_name }}"    # Release 标题
          generate_release_notes: true                # 自动生成更新日志
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
