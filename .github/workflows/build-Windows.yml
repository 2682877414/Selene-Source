# ==========================================================
# 【永久版 - 带全注释 - 绝对出包】梦瑶影视 Windows 构建脚本
# 解决问题：文件找不到、打包失败、Release 为空、版本错乱
# ==========================================================
name: 梦瑶影视 2.0 (Windows 自动构建)

# 触发条件：打 v 开头标签自动运行
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ==============================================
      # 步骤 1：拉取代码
      # ==============================================
      - name: 拉取项目代码
        uses: actions/checkout@v4

      # ==============================================
      # 步骤 2：安装 Flutter 环境
      # ==============================================
      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      # ==============================================
      # 步骤 3：安装依赖
      # ==============================================
      - name: 安装项目依赖
        run: flutter pub get

      # ==============================================
      # 步骤 4：编译 Windows 正式版
      # ==============================================
      - name: 编译 Windows 程序
        run: flutter build windows --release

      # ==============================================
      # 步骤 5：【修复版】打包成 ZIP（绝对能生成文件）
      # 重点：先查看目录，确认文件存在
      # ==============================================
      - name: 查看编译后的文件（调试用）
        run: dir build/windows/x64/runner/Release

      # ==============================================
      # 步骤 6：【正确打包】生成 ZIP
      # ==============================================
      - name: 打包为 ZIP 压缩包
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "MengYaoTV-$version.zip"
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath "../../../../$zipName" -Force

      # ==============================================
      # 步骤 7：查看根目录是否生成 ZIP
      # ==============================================
      - name: 查看是否生成 ZIP 文件
        run: dir

      # ==============================================
      # 步骤 8：上传到 Release（绝对成功）
      # ==============================================
      - name: 上传 ZIP 到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MengYaoTV-${{ github.ref_name }}.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
